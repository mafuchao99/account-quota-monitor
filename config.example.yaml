app:
  timezone: Asia/Shanghai
  database_url: sqlite:///data/monitor.db
  report_dir: data/reports
  report_cron: "0 */30 * * * *"

notifications:
  onebot:
    endpoint: http://127.0.0.1:3000
    access_token: ""
    retry_count: 2
    group_ids: ["123456789"]
    private_user_ids: []

targets:
  - id: codex-quota
    name: Codex 额度
    collector: cli_proxy_codex
    base_url: ${CPA_ENDPOINT}
    cron: "0 */30 * * * *"
    dynamic_schedule:
      enabled: true
      normal_interval_minutes: 30
      urgent_interval_minutes: 10
      # 不配置时默认沿用 thresholds.remaining_percent。
      urgent_remaining_percent: 20
    headers:
      # CPA_ENDPOINT 和 CPA_MANAGEMENT_KEY 都从本地 .env 或系统环境变量读取。
      # 开源仓库里不要提交真实接口地址或 Management Key。
      Authorization: "Bearer ${CPA_MANAGEMENT_KEY}"
    thresholds:
      available_drop: 1
      unauthorized: 1
      other_errors: 1
      remaining_percent: 20
      silence_minutes: 60
