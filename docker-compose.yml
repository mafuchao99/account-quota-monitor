services:
  cpa-monitor:
    build: .
    container_name: cpa-monitor
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CPA_MONITOR_CONFIG: /app/config/config.yaml
      CPA_ENDPOINT: ${CPA_ENDPOINT:-}
      CPA_MANAGEMENT_KEY: ${CPA_MANAGEMENT_KEY:-}
      SUB2_ENDPOINT: ${SUB2_ENDPOINT:-}
      SUB2_ADMIN_API_KEY: ${SUB2_ADMIN_API_KEY:-}
      ONEBOT_ACCESS_TOKEN: ${ONEBOT_ACCESS_TOKEN:-}
      TZ: Asia/Shanghai
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro
      - ./data:/app/data
